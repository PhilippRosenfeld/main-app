<div style="background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1rem;">

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;">
    <p style="font-size: 13px; color: gray; margin: 0;">Verlauf</p>

    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
      <label style="font-size: 13px; display: flex; align-items: center; gap: 4px;">
        <input type="checkbox" [(ngModel)]="showTemp" (change)="onToggle()"> Temperatur
      </label>
      <label style="font-size: 13px; display: flex; align-items: center; gap: 4px;">
        <input type="checkbox" [(ngModel)]="showHumidity" (change)="onToggle()"> Luftfeuchtigkeit
      </label>
      <label style="font-size: 13px; display: flex; align-items: center; gap: 4px;">
        <input type="checkbox" [(ngModel)]="showPressure" (change)="onToggle()"> Luftdruck
      </label>

      <select (change)="onLimitChange($event)" style="font-size: 13px;">
        <option value="10">10</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="250">250</option>
        <option value="1000">1.000</option>
        <option value="10000">10.000</option>
      </select>
    </div>
  </div>

  <canvas #canvas></canvas>
</div>
